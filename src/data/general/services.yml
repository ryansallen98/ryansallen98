process:
  eyebrow: Delivery shape
  title: A Simple Path From Messy Need To Usable System.
  steps:
    - title: Scope The Real Job
      text: Clarify the user, workflow, data, constraints, budget, and risk before choosing the build shape.
    - title: Build The Focused Version
      text: Ship the smallest useful release with the right stack and a clean enough foundation to iterate.
    - title: Stabilise And Hand Over
      text: Test, document, CMS-proof editable content, and make support or next steps clear.
