process:
  eyebrow: How I work
  title: Scope it. Ship it. Stabilise it.
  steps:
    - title: Map the real workflow
      text: User journey, business goal, data sources, constraints, and friction.
    - title: Build the smallest useful version
      text: A focused first version beats a long invisible build.
    - title: Stabilise and hand over
      text: Debugging, documentation, CMS ownership, and support.
